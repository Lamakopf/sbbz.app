<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rechtschreib-Rennen 🏎️</title>
    <link rel="stylesheet" href="./assets/fonts/fonts.css">
    <style>
        :root {
            --racing-red: #e63946;
            --racing-orange: #ff9f1c;
            --racing-yellow: #ffbe0b;
            --speed-blue: #00b4d8;
            --turbo-cyan: #00f5d4;
            --track-dark: #1a1a2e;
            --track-darker: #0f0f1a;
            --asphalt: #2d2d44;
            --grass-green: #57cc99;
            --finish-gold: #ffd700;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--track-darker);
            min-height: 100vh;
            overflow-x: hidden;
            color: var(--white);
        }

        /* Emoji selbst spiegeln */
        .car-emoji{
        display: inline-block;
        transform: scaleX(-1);
        transform-origin: center;
        }

        /* Animated Racing Background */
        .racing-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(180deg, var(--track-darker) 0%, var(--track-dark) 50%, var(--asphalt) 100%);
            z-index: 0;
        }

        /* Speed Lines */
        .speed-lines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .speed-line {
            position: absolute;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: speedLine 0.8s linear infinite;
            opacity: 0;
        }

        .speed-lines.racing .speed-line {
            opacity: 1;
        }

        @keyframes speedLine {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* Checkered Pattern */
        .checkered-border {
            height: 15px;
            background: repeating-linear-gradient(
                90deg,
                var(--white) 0px,
                var(--white) 15px,
                var(--track-dark) 15px,
                var(--track-dark) 30px
            );
            animation: checkeredMove 0.5s linear infinite;
        }

        @keyframes checkeredMove {
            0% { background-position: 0 0; }
            100% { background-position: 30px 0; }
        }

        /* Main Container */
        .game-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            padding: 15px 20px;
            background: linear-gradient(180deg, rgba(0,0,0,0.8) 0%, transparent 100%);
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 2.5rem;
            animation: carBounce 0.5s ease-in-out infinite;
        }

        @keyframes carBounce {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-5px) rotate(2deg); }
        }

        .title {
            font-family: 'Russo One', sans-serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            background: linear-gradient(135deg, var(--racing-yellow), var(--racing-orange), var(--racing-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Stats */
        .stats-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .stat-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 50px;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .stat-icon {
            font-size: 1.5rem;
        }

        .stat-value {
            font-family: 'Russo One', sans-serif;
            font-size: 1.4rem;
            color: var(--racing-yellow);
        }

        .stat-value.time {
            color: var(--turbo-cyan);
            min-width: 60px;
        }

        /* Race Track Progress */
        .race-track-container {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
        }

        .track-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .race-track {
            position: relative;
            height: 60px;
            background: var(--asphalt);
            border-radius: 30px;
            overflow: hidden;
            border: 4px solid var(--track-dark);
            box-shadow: inset 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        /* Track markings */
        .track-markings {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            transform: translateY(-50%);
            background: repeating-linear-gradient(
                90deg,
                var(--racing-yellow) 0px,
                var(--racing-yellow) 20px,
                transparent 20px,
                transparent 40px
            );
            opacity: 0.5;
        }

        .track-progress {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--grass-green), var(--turbo-cyan));
            border-radius: 26px;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 0 20px var(--turbo-cyan);
        }

        .car-racer {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 2.5rem;
            transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.8));
            z-index: 10;
        }

        .car-racer.boost {
            animation: carBoost 0.3s ease-out;
        }

        @keyframes carBoost {
            0% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.3); }
            100% { transform: translateY(-50%) scale(1); }
        }

        .finish-flag {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.8rem;
        }

        /* Checkpoint markers */
        .checkpoints {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            pointer-events: none;
        }

        .checkpoint {
            width: 3px;
            height: 100%;
            background: rgba(255, 255, 255, 0.2);
        }

        .checkpoint.passed {
            background: var(--racing-yellow);
            box-shadow: 0 0 10px var(--racing-yellow);
        }

        /* Game Area */
        .game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            gap: 25px;
        }

        /* Word Display */
        .word-display {
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            padding: 30px 50px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .word-display::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent 30%);
            animation: shimmer 3s linear infinite;
        }

        @keyframes shimmer {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .word-text {
            position: relative;
            font-family: 'Russo One', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4rem);
            letter-spacing: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .letter {
            display: inline-block;
            transition: all 0.3s;
        }

        .letter-slot {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: clamp(50px, 12vw, 80px);
            height: clamp(60px, 14vw, 90px);
            background: linear-gradient(135deg, var(--racing-orange), var(--racing-red));
            border-radius: 15px;
            margin: 0 5px;
            font-size: clamp(2rem, 6vw, 3rem);
            color: white;
            box-shadow: 
                0 8px 25px rgba(230, 57, 70, 0.5),
                inset 0 2px 0 rgba(255,255,255,0.3);
            animation: slotPulse 1.5s ease-in-out infinite;
            border: 3px solid rgba(255,255,255,0.3);
        }

        @keyframes slotPulse {
            0%, 100% { transform: scale(1); box-shadow: 0 8px 25px rgba(230, 57, 70, 0.5); }
            50% { transform: scale(1.05); box-shadow: 0 12px 35px rgba(230, 57, 70, 0.7); }
        }

        .letter-slot.correct {
            background: linear-gradient(135deg, var(--grass-green), var(--turbo-cyan));
            animation: correctFlash 0.5s ease-out;
            box-shadow: 0 8px 30px rgba(0, 245, 212, 0.6);
        }

        .letter-slot.wrong {
            background: linear-gradient(135deg, #ff4757, #c0392b);
            animation: wrongShake 0.5s ease-out;
        }

        @keyframes correctFlash {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-10px); }
            40% { transform: translateX(10px); }
            60% { transform: translateX(-10px); }
            80% { transform: translateX(10px); }
        }

        /* Hint */
        .word-hint {
            text-align: center;
            margin-top: 15px;
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.7);
            font-weight: 600;
        }

        .word-hint .hint-icon {
            margin-right: 8px;
        }

        /* Choice Buttons */
        .choices-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 500px;
        }

        .choice-btn {
            width: 90px;
            height: 90px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
        }

        .choice-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(180deg, rgba(255,255,255,0.3), transparent);
            border-radius: 20px 20px 0 0;
        }

        .choice-btn:nth-child(1) {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .choice-btn:nth-child(2) {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            box-shadow: 0 8px 25px rgba(240, 147, 251, 0.4);
        }

        .choice-btn:nth-child(3) {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
            box-shadow: 0 8px 25px rgba(79, 172, 254, 0.4);
        }

        .choice-btn:nth-child(4) {
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            color: white;
            box-shadow: 0 8px 25px rgba(67, 233, 123, 0.4);
        }

        .choice-btn:hover {
            transform: translateY(-8px) scale(1.1);
        }

        .choice-btn:active {
            transform: translateY(-4px) scale(1.05);
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Streak & Combo Display */
        .streak-display {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Russo One', sans-serif;
            font-size: 4rem;
            color: var(--racing-yellow);
            text-shadow: 0 0 30px var(--racing-yellow), 0 0 60px var(--racing-orange);
            z-index: 100;
            pointer-events: none;
            opacity: 0;
        }

        .streak-display.show {
            animation: streakPop 1s ease-out forwards;
        }

        @keyframes streakPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.5); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2) translateY(-50px); }
        }

        /* Start Screen */
        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--track-darker);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .start-screen.hidden {
            display: none;
        }

        .start-car {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: carReady 1s ease-in-out infinite;
        }

        @keyframes carReady {
            0%, 100% { transform: translateX(-10px) rotate(-5deg); }
            50% { transform: translateX(10px) rotate(5deg); }
        }

        .start-title {
            font-family: 'Russo One', sans-serif;
            font-size: clamp(2.5rem, 8vw, 5rem);
            background: linear-gradient(135deg, var(--racing-yellow), var(--racing-orange), var(--racing-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .start-subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            text-align: center;
        }

        /* Mode Selection */
        .mode-selection {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .mode-btn {
            padding: 25px 35px;
            border: none;
            border-radius: 20px;
            font-family: 'Russo One', sans-serif;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            min-width: 180px;
        }

        .mode-btn .mode-icon {
            font-size: 2.5rem;
        }

        .mode-btn.turbo {
            background: linear-gradient(135deg, var(--racing-red), var(--racing-orange));
            color: white;
            box-shadow: 0 10px 30px rgba(230, 57, 70, 0.4);
        }

        .mode-btn.chill {
            background: linear-gradient(135deg, var(--speed-blue), var(--turbo-cyan));
            color: white;
            box-shadow: 0 10px 30px rgba(0, 180, 216, 0.4);
        }

        .mode-btn:hover {
            transform: translateY(-5px) scale(1.05);
        }

        .mode-btn.selected {
            border: 4px solid var(--white);
            transform: scale(1.05);
        }

        .mode-description {
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .start-btn {
            font-family: 'Russo One', sans-serif;
            font-size: 1.8rem;
            padding: 20px 60px;
            background: linear-gradient(135deg, var(--grass-green), var(--turbo-cyan));
            border: none;
            border-radius: 50px;
            color: var(--track-dark);
            cursor: pointer;
            letter-spacing: 3px;
            box-shadow: 0 10px 40px rgba(0, 245, 212, 0.4);
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .start-btn:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 50px rgba(0, 245, 212, 0.6);
        }

        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Countdown */
        .countdown {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .countdown.show {
            display: flex;
        }

        .countdown-number {
            font-family: 'Russo One', sans-serif;
            font-size: 15rem;
            color: var(--racing-yellow);
            text-shadow: 0 0 50px var(--racing-yellow), 0 0 100px var(--racing-orange);
            animation: countdownPulse 1s ease-out;
        }

        .countdown-number.go {
            color: var(--grass-green);
            text-shadow: 0 0 50px var(--grass-green), 0 0 100px var(--turbo-cyan);
        }

        @keyframes countdownPulse {
            0% { transform: scale(2); opacity: 0; }
            50% { transform: scale(1); opacity: 1; }
            100% { transform: scale(0.8); opacity: 0; }
        }

        /* End Screen */
        .end-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--track-darker);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 20px;
        }

        .end-screen.show {
            display: flex;
        }

        .trophy {
            font-size: 6rem;
            margin-bottom: 20px;
            animation: trophySpin 1s ease-out;
        }

        @keyframes trophySpin {
            0% { transform: scale(0) rotate(-180deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        .end-title {
            font-family: 'Russo One', sans-serif;
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: var(--finish-gold);
            text-shadow: 0 0 30px var(--finish-gold);
            text-align: center;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .end-stats {
            display: flex;
            gap: 40px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .end-stat {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 30px;
            border-radius: 20px;
        }

        .end-stat-value {
            font-family: 'Russo One', sans-serif;
            font-size: 3rem;
            color: var(--turbo-cyan);
            text-shadow: 0 0 20px var(--turbo-cyan);
        }

        .end-stat-label {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .rank-badge {
            background: linear-gradient(135deg, var(--finish-gold), var(--racing-orange));
            padding: 15px 40px;
            border-radius: 50px;
            margin-bottom: 30px;
        }

        .rank-title {
            font-family: 'Russo One', sans-serif;
            font-size: 1.5rem;
            color: var(--track-dark);
        }

        /* Particles */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .particle {
            position: absolute;
            font-size: 2rem;
            animation: particleFly 1s ease-out forwards;
        }

        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translate(var(--tx), var(--ty)) scale(0) rotate(360deg); }
        }

        /* Timer danger */
        .stat-value.time.danger {
            color: var(--racing-red);
            animation: timeDanger 0.5s infinite;
        }

        @keyframes timeDanger {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Responsive */
        @media (max-width: 600px) {
            .choice-btn {
                width: 75px;
                height: 75px;
                font-size: 2rem;
            }

            .word-display {
                padding: 20px 30px;
            }

            .car-racer {
                font-size: 2rem;
            }

            .mode-btn {
                min-width: 150px;
                padding: 20px 25px;
            }
        }
    </style>
</head>
<body>
    <div class="racing-bg"></div>
    <div class="speed-lines" id="speedLines">
        <!-- Speed lines generated by JS -->
    </div>
    <div class="particles" id="particles"></div>

    <!-- Start Screen -->
    <div class="start-screen" id="startScreen">
        <div class="start-car"><span class="car-emoji">🏎️</span></div>
        <div class="start-title">Rechtschreib-Rennen</div>
        <div class="start-subtitle">Finde die fehlenden Buchstaben!</div>
        
        <div class="mode-selection">
            <button class="mode-btn turbo" onclick="selectMode('turbo')" id="turboMode">
                <span class="mode-icon">⚡</span>
                <span>TURBO</span>
                <span class="mode-description">Gegen die Zeit!</span>
            </button>
            <button class="mode-btn chill" onclick="selectMode('chill')" id="chillMode">
                <span class="mode-icon">😎</span>
                <span>ENTSPANNT</span>
                <span class="mode-description">Ohne Zeitdruck</span>
            </button>
        </div>
        
        <button class="start-btn" onclick="startCountdown()" id="startBtn" disabled>
            🏁 LOS GEHT'S!
        </button>
    </div>

    <!-- Countdown -->
    <div class="countdown" id="countdown">
        <div class="countdown-number" id="countdownNumber">3</div>
    </div>

    <!-- End Screen -->
    <div class="end-screen" id="endScreen">
        <div class="trophy">🏆</div>
        <div class="end-title" id="endTitle">ZIEL ERREICHT!</div>
        <div class="end-stats">
            <div class="end-stat">
                <div class="end-stat-value" id="finalScore">0</div>
                <div class="end-stat-label">Punkte</div>
            </div>
            <div class="end-stat">
                <div class="end-stat-value" id="finalCorrect">0/0</div>
                <div class="end-stat-label">Richtig</div>
            </div>
            <div class="end-stat">
                <div class="end-stat-value" id="finalTime">0s</div>
                <div class="end-stat-label">Zeit</div>
            </div>
        </div>
        <div class="rank-badge">
            <div class="rank-title" id="rankTitle">⭐ Super Fahrer!</div>
        </div>
        <button class="start-btn" onclick="restartGame()">🔄 NOCHMAL!</button>
    </div>

    <!-- Game UI -->
    <div class="game-container" id="gameContainer">

        // Word Database - Einfache Wörter für SBBZ-L mit Schwierigkeit

            { word: 'Opa', missing: 0, hint: '👴 Papas Papa', options: ['O', 'A', 'U', 'E'] },
            
            // U/u Wörter
            { word: 'Uhr', missing: 0, hint: '⏰ Zeigt die Zeit', options: ['U', 'O', 'A', 'I'] },
            { word: 'Ufo', missing: 0, hint: '🛸 Fliegt am Himmel', options: ['U', 'O', 'A', 'E'] },
            
            // Mittlere Buchstaben
            { word: 'Ball', missing: 1, hint: '⚽ Zum Spielen', options: ['a', 'e', 'o', 'u'] },
            { word: 'Hund', missing: 1, hint: '🐕 Bellt und wedelt', options: ['u', 'a', 'i', 'o'] },
            { word: 'Katze', missing: 1, hint: '🐱 Sagt Miau', options: ['a', 'e', 'o', 'u'] },
            { word: 'Maus', missing: 1, hint: '🐭 Klein und schnell', options: ['a', 'e', 'o', 'u'] },
            { word: 'Haus', missing: 1, hint: '🏠 Dort wohnst du', options: ['a', 'e', 'o', 'u'] },
            { word: 'Baum', missing: 1, hint: '🌳 Hat Blätter', options: ['a', 'e', 'o', 'u'] },
            { word: 'Buch', missing: 1, hint: '📖 Zum Lesen', options: ['u', 'a', 'o', 'i'] },
            { word: 'Tisch', missing: 1, hint: '🪑 Steht in der Küche', options: ['i', 'a', 'e', 'u'] },
            { word: 'Fisch', missing: 1, hint: '🐟 Schwimmt im Wasser', options: ['i', 'a', 'e', 'o'] },
            { word: 'Vogel', missing: 1, hint: '🐦 Kann fliegen', options: ['o', 'a', 'e', 'u'] },
            { word: 'Sonne', missing: 1, hint: '☀️ Scheint am Tag', options: ['o', 'a', 'u', 'e'] },
            { word: 'Mond', missing: 1, hint: '🌙 Leuchtet nachts', options: ['o', 'a', 'u', 'e'] },
            { word: 'Stern', missing: 2, hint: '⭐ Funkelt am Himmel', options: ['e', 'a', 'i', 'o'] },
            { word: 'Blume', missing: 2, hint: '🌸 Wächst im Garten', options: ['u', 'a', 'o', 'i'] },
            { word: 'Schule', missing: 3, hint: '🏫 Dort lernst du', options: ['u', 'a', 'o', 'e'] },
            { word: 'Wolke', missing: 1, hint: '☁️ Am Himmel', options: ['o', 'a', 'u', 'e'] },
            { word: 'Regen', missing: 1, hint: '🌧️ Macht nass', options: ['e', 'a', 'i', 'o'] },
            
            // Doppelte Buchstaben
            { word: 'Sommer', missing: 2, hint: '☀️ Warme Jahreszeit', options: ['m', 'n', 'l', 'r'] },
            { word: 'Wasser', missing: 2, hint: '💧 Zum Trinken', options: ['s', 'r', 'l', 't'] },
            { word: 'Butter', missing: 2, hint: '🧈 Aufs Brot', options: ['t', 's', 'n', 'm'] },
            { word: 'Sonne', missing: 2, hint: '☀️ Scheint hell', options: ['n', 'm', 'l', 'r'] },
            { word: 'Brille', missing: 3, hint: '👓 Auf der Nase', options: ['l', 'n', 'm', 'r'] },
            
            // Ende-Buchstaben
            { word: 'Auto', missing: 3, hint: '🚗 Fährt auf der Straße', options: ['o', 'a', 'e', 'i'] },
            { word: 'Foto', missing: 3, hint: '📷 Ein Bild', options: ['o', 'a', 'e', 'u'] },
            { word: 'Sofa', missing: 3, hint: '🛋️ Zum Sitzen', options: ['a', 'o', 'e', 'i'] },
            { word: 'Mama', missing: 3, hint: '👩 Deine Mutter', options: ['a', 'o', 'e', 'i'] },
            { word: 'Papa', missing: 3, hint: '👨 Dein Vater', options: ['a', 'o', 'e', 'i'] },
        ];

        // Game State
        let gameState = {
            score: 0,
            streak: 0,
            turbo: 0,
            currentWord: 0,
            totalWords: 15,
            correct: 0,
            mode: null,
            timeLeft: 60,
            timerInterval: null,
            isPlaying: false,
            usedWords: [],
            startTime: null
        };

        // DOM Elements
        const scoreEl = document.getElementById('score');
        const streakEl = document.getElementById('streak');
        const timerEl = document.getElementById('timer');
        const timerBox = document.getElementById('timerBox');
        const trackProgress = document.getElementById('trackProgress');
        const carRacer = document.getElementById('carRacer');
        const wordText = document.getElementById('wordText');
        const hintText = document.getElementById('hintText');
        const choicesContainer = document.getElementById('choices');
        const speedLines = document.getElementById('speedLines');
        const streakDisplay = document.getElementById('streakDisplay');
        const checkpoints = document.getElementById('checkpoints');

        // Create Speed Lines
        function createSpeedLines() {
            for (let i = 0; i < 15; i++) {
                const line = document.createElement('div');
                line.className = 'speed-line';
                line.style.top = Math.random() * 100 + '%';
                line.style.width = (100 + Math.random() * 200) + 'px';
                line.style.animationDelay = Math.random() * 0.5 + 's';
                line.style.animationDuration = (0.3 + Math.random() * 0.5) + 's';
                speedLines.appendChild(line);
            }
        }

        // Create Checkpoints
        function createCheckpoints() {
            checkpoints.innerHTML = '';
            for (let i = 1; i < gameState.totalWords; i++) {
                const cp = document.createElement('div');
                cp.className = 'checkpoint';
                cp.id = `checkpoint-${i}`;
                checkpoints.appendChild(cp);
            }
        }

        // Select Mode
        function selectMode(mode) {
            gameState.mode = mode;
            
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById(mode + 'Mode').classList.add('selected');
            document.getElementById('startBtn').disabled = false;

            if (mode === 'chill') {
                timerBox.style.display = 'none';
            } else {
                timerBox.style.display = 'flex';
            }
        }

        // Start Countdown
        function startCountdown() {
            document.getElementById('startScreen').classList.add('hidden');
            const countdown = document.getElementById('countdown');
            const countdownNumber = document.getElementById('countdownNumber');
            countdown.classList.add('show');

            let count = 3;
            countdownNumber.textContent = count;
            countdownNumber.className = 'countdown-number';

            const countInterval = setInterval(() => {
                count--;
                if (count > 0) {
                    countdownNumber.textContent = count;
                    countdownNumber.style.animation = 'none';
                    countdownNumber.offsetHeight;
                    countdownNumber.style.animation = 'countdownPulse 1s ease-out';
                } else if (count === 0) {
                    countdownNumber.textContent = 'LOS!';
                    countdownNumber.classList.add('go');
                    countdownNumber.style.animation = 'none';
                    countdownNumber.offsetHeight;
                    countdownNumber.style.animation = 'countdownPulse 1s ease-out';
                } else {
                    clearInterval(countInterval);
                    countdown.classList.remove('show');
                    startGame();
                }
            }, 1000);
        }

        // Get Random Word
        function getRandomWord() {
            const available = words.filter((_, i) => !gameState.usedWords.includes(i));
            if (available.length === 0) {
                gameState.usedWords = [];
                return words[Math.floor(Math.random() * words.length)];
            }
            const index = words.indexOf(available[Math.floor(Math.random() * available.length)]);
            gameState.usedWords.push(index);
            return words[index];
        }

        // Load Word
        function loadWord() {
            const wordData = getRandomWord();
            const word = wordData.word;
            const missingIndex = wordData.missing;
            const correctLetter = word[missingIndex];

            // Build word display
            let wordHTML = '';
            for (let i = 0; i < word.length; i++) {
                if (i === missingIndex) {
                    wordHTML += `<span class="letter-slot" id="letterSlot" data-correct="${correctLetter}"></span>`;
                } else {
                    wordHTML += `<span class="letter">${word[i]}</span>`;
                }
            }
            wordText.innerHTML = wordHTML;
            hintText.textContent = wordData.hint;

            // Shuffle and create choice buttons
            const shuffled = [...wordData.options].sort(() => Math.random() - 0.5);
            choicesContainer.innerHTML = '';
            shuffled.forEach(letter => {
                const btn = document.createElement('button');
                btn.className = 'choice-btn';
                btn.textContent = letter;
                btn.onclick = () => selectLetter(letter, correctLetter);
                choicesContainer.appendChild(btn);
            });
        }

        // Select Letter
        function selectLetter(selected, correct) {
            if (!gameState.isPlaying) return;

            const slot = document.getElementById('letterSlot');
            const isCorrect = selected.toLowerCase() === correct.toLowerCase();

            // Disable all buttons
            document.querySelectorAll('.choice-btn').forEach(btn => {
                btn.disabled = true;
            });

            slot.textContent = selected;

            if (isCorrect) {
                // Correct!
                slot.classList.add('correct');
                gameState.streak++;
                gameState.correct++;
                gameState.turbo = Math.min(100, gameState.turbo + 25);

                // Score with streak bonus
                const points = 100 + (gameState.streak * 20);
                gameState.score += points;

                // Car boost
                carRacer.classList.add('boost');
                setTimeout(() => carRacer.classList.remove('boost'), 300);

                // Speed lines
                speedLines.classList.add('racing');

                // Particles
                createParticles(['⭐', '✨', '🔥', '💯']);

                // Show streak message
                if (gameState.streak >= 3) {
                    showStreakMessage();
                }

                // Add time in turbo mode
                if (gameState.mode === 'turbo' && gameState.streak >= 3) {
                    gameState.timeLeft += 2;
                    showTimeBonus();
                }

            } else {
                // Wrong
                slot.classList.add('wrong');
                slot.textContent = correct; // Show correct answer
                gameState.streak = 0;
                gameState.turbo = Math.max(0, gameState.turbo - 20);

                speedLines.classList.remove('racing');
                createParticles(['😅', '💨']);
            }

            // Update UI
            updateUI();

            // Progress
            gameState.currentWord++;
            updateProgress();

            // Check if done
            if (gameState.currentWord >= gameState.totalWords) {
                setTimeout(() => endGame(), 1000);
            } else {
                setTimeout(() => {
                    loadWord();
                }, 1200);
            }
        }

        // Update Progress
        function updateProgress() {
            const progress = (gameState.currentWord / gameState.totalWords) * 100;
            trackProgress.style.width = progress + '%';
            carRacer.style.left = `calc(${Math.min(progress, 90)}% - 20px)`;

            // Update checkpoints
            for (let i = 1; i <= gameState.currentWord; i++) {
                const cp = document.getElementById(`checkpoint-${i}`);
                if (cp) cp.classList.add('passed');
            }
        }

        // Update UI
        function updateUI() {
            scoreEl.textContent = gameState.score;
            streakEl.textContent = gameState.streak;
        }

        // Timer
        function startTimer() {
            if (gameState.mode !== 'turbo') return;

            gameState.timerInterval = setInterval(() => {
                gameState.timeLeft--;
                timerEl.textContent = gameState.timeLeft;

                if (gameState.timeLeft <= 10) {
                    timerEl.classList.add('danger');
                } else {
                    timerEl.classList.remove('danger');
                }

                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // Show Streak Message
        function showStreakMessage() {
            const messages = ['SUPER! 🔥', 'TURBO! ⚡', 'MEGA! 💥', 'HAMMER! 💪', 'WAHNSINN! 🚀'];
            streakDisplay.textContent = messages[Math.min(gameState.streak - 3, messages.length - 1)];
            streakDisplay.classList.add('show');
            setTimeout(() => streakDisplay.classList.remove('show'), 1000);
        }

        // Show Time Bonus
        function showTimeBonus() {
            const bonus = document.createElement('div');
            bonus.style.cssText = `
                position: fixed;
                top: 20%;
                left: 50%;
                transform: translateX(-50%);
                font-family: 'Russo One', sans-serif;
                font-size: 2rem;
                color: var(--turbo-cyan);
                text-shadow: 0 0 20px var(--turbo-cyan);
                z-index: 100;
                animation: scorePopup 1s ease-out forwards;
            `;
            bonus.textContent = '+2s ⏱️';
            document.body.appendChild(bonus);
            setTimeout(() => bonus.remove(), 1000);
        }

        // Create Particles
        function createParticles(emojis) {
            const container = document.getElementById('particles');
            const rect = document.querySelector('.word-display').getBoundingClientRect();

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                particle.style.left = (rect.left + rect.width / 2) + 'px';
                particle.style.top = (rect.top + rect.height / 2) + 'px';
                particle.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
                particle.style.setProperty('--ty', -50 - Math.random() * 100 + 'px');
                container.appendChild(particle);
                setTimeout(() => particle.remove(), 1000);
            }
        }

        // Get Rank
        function getRank(percentage, time) {
            if (percentage >= 90) return '🏆 CHAMPION!';
            if (percentage >= 75) return '🥇 PROFI-FAHRER!';
            if (percentage >= 60) return '🥈 GUTER FAHRER!';
            if (percentage >= 40) return '🥉 ANFÄNGER!';
            return '🎮 ÜBUNG MACHT DEN MEISTER!';
        }

        // Start Game
        function startGame() {
            gameState = {
                score: 0,
                streak: 0,
                turbo: 0,
                currentWord: 0,
                totalWords: 15,
                correct: 0,
                mode: gameState.mode,
                timeLeft: 60,
                timerInterval: null,
                isPlaying: true,
                usedWords: [],
                startTime: Date.now()
            };

            createCheckpoints();
            updateUI();
            updateProgress();
            timerEl.textContent = '60';
            timerEl.classList.remove('danger');

            if (gameState.mode === 'turbo') {
                startTimer();
            }

            loadWord();
        }

        // End Game
        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameState.timerInterval);
            speedLines.classList.remove('racing');

            const endTime = Math.round((Date.now() - gameState.startTime) / 1000);
            const percentage = Math.round((gameState.correct / gameState.totalWords) * 100);

            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalCorrect').textContent = `${gameState.correct}/${gameState.totalWords}`;
            document.getElementById('finalTime').textContent = endTime + 's';
            document.getElementById('rankTitle').textContent = getRank(percentage, endTime);

            if (percentage >= 75) {
                document.getElementById('endTitle').textContent = '🎉 ZIEL ERREICHT!';
            } else {
                document.getElementById('endTitle').textContent = 'RENNEN BEENDET!';
            }

            document.getElementById('endScreen').classList.add('show');
        }

        // Restart Game
        function restartGame() {
            document.getElementById('endScreen').classList.remove('show');
            document.getElementById('startScreen').classList.remove('hidden');
            
            // Reset mode selection
            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('startBtn').disabled = true;
            gameState.mode = null;
        }

        // Add keyframes for score popup
        const style = document.createElement('style');
        style.textContent = `
            @keyframes scorePopup {
                0% { transform: translateX(-50%) translateY(0) scale(0.5); opacity: 0; }
                20% { transform: translateX(-50%) translateY(-20px) scale(1.2); opacity: 1; }
                100% { transform: translateX(-50%) translateY(-80px) scale(1); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        // Initialize
        createSpeedLines();
    </script>
</body>

  function openLegal(){

    overlay.setAttribute("aria-hidden","false");
  }
  function closeLegal(){
    overlay.classList.remove("is-open");
    overlay.setAttribute("aria-hidden","true");
  }

  btn.addEventListener("click", openLegal);
  closeBtn.addEventListener("click", closeLegal);

  // click outside panel closes
  overlay.addEventListener("click", (e) => {
    if (e.target === overlay) closeLegal();
  });

  // ESC closes (desktop)
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && overlay.classList.contains("is-open")) closeLegal();
  });
</script>
</html>
